<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Web Inventaris Yayasan Ummul Quro' Semarang</title>
    <link rel="icon" href="logo.jpeg" type="image/x-icon" />
    <style>
      /* Reset Default */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: Arial, sans-serif;
        background-color: #f4f4f9;
        position: relative;
        min-height: 100vh;
        overflow: hidden;
        background: linear-gradient(45deg, #edf0ed, #5bffdb, #09f811);
        background-size: 300% 300%;
        animation: gradientAnimation 10s ease infinite; /* Background animasi */
      }

      /* Animasi untuk latar belakang */
      @keyframes gradientAnimation {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }

      /* Navbar Style */
      .navbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background-color: #5cb85c;
        color: #fff;
        padding: 10px 20px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      }

      .navbar .logo {
        display: flex;
        align-items: center;
      }

      .navbar .logo img {
        height: 40px;
        margin-right: 10px;
      }

      .navbar h1 {
        font-size: 20px;
        font-weight: bold;
        margin: 0;
      }

      /* Login Container */
      .login-container {
        background: #fff;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        width: 350px;
        text-align: center;
        margin: 50px auto;
      }

      .login-container h2 {
        font-size: 32px;
        font-weight: bold;
        color: #333;
        background: linear-gradient(90deg, #5cb85c, #4cae4c);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.2);
        margin-bottom: 20px;
      }

      .form-group {
        margin-bottom: 15px;
        text-align: left;
      }

      .form-group label {
        display: block;
        font-size: 14px;
        color: #555;
        margin-bottom: 5px;
      }

      .form-group input {
        width: 100%;
        height: 40px;
        padding: 0 10px;
        font-size: 16px;
        border: 1px solid #ccc;
        border-radius: 5px;
      }

      .form-group input:focus {
        border-color: #5cb85c;
        outline: none;
      }

      .login-btn {
        width: 100%;
        padding: 10px;
        font-size: 16px;
        color: #fff;
        background-color: #5cb85c;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        transition: background-color 0.3s ease;
      }

      .login-btn:hover {
        background-color: #187579;
      }

      /* Footer Style */
      footer {
        background-color: #333;
        color: #fff;
        text-align: center;
        padding: 10px 0;
        position: absolute;
        bottom: 0;
        width: 100%;
      }

      footer p {
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar">
      <div class="logo">
        <img src="logo.jpeg" alt="Logo" />
        <!-- Ganti dengan URL logo -->
        <h1>YAYASAN UMMUL QURO' SEMARANG</h1>
      </div>
    </nav>

    <!-- Login Form -->
    <div class="login-container">
      <h2>Login</h2>
      <form action="login.php" method="POST">
        <div class="form-group">
          <label for="username">Username</label>
          <input
            type="text"
            name="username"
            id="username"
            placeholder="Enter your username"
            required
          />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            name="password"
            id="password"
            placeholder="Enter your password"
            required
          />
        </div>
        <button type="submit" class="login-btn">Login</button>
      </form>
    </div>

    <!-- Footer -->
    <footer>
      <p>
        &copy; 2024 Inventaris Yayasan Ummul Quro' Website. by. ZIIYOU CREATOR.
      </p>
    </footer>
  </body>
</html>
